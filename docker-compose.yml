services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sa.json:/app/sa.json:ro
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/sa.json
      - DATABASE_URL=sqlite+aiosqlite:////app/data/coscienza.db
      - DATA_DIR=/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
    volumes:
      - ./data:/app/data
      - ./sa.json:/app/sa.json:ro
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/sa.json
      - DATABASE_URL=sqlite:////app/data/coscienza.db
      - DATA_DIR=/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional: serve the Expo Web build
  # web:
  #   image: nginx:alpine
  #   ports:
  #     - "3000:80"
  #   volumes:
  #     - ./apps/mobile/dist:/usr/share/nginx/html:ro

volumes:
  redis_data:
